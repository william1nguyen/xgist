name: Reusable Docker Build & Deploy

on:
  workflow_call:
    inputs:
      app-name:
        description: "Tên app trong GHCR (server | web | worker)"
        required: true
        type: string
      context:
        description: "Docker build context path"
        required: true
        type: string
      dockerfile:
        description: "Path tới Dockerfile"
        required: true
        type: string
      build-args:
        description: "Docker build args (multiline string)"
        required: false
        type: string
        default: ""
    secrets:
      GH_TOKEN:
        required: true
      CAPROVER_SERVER:
        required: true
      CAPROVER_APP_NAME:
        required: true
      CAPROVER_APP_TOKEN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      image-url: ${{ steps.image.outputs.url }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GH_TOKEN }}

      - name: Generate Image URL
        id: image
        run: |
          SHA=$(echo ${{ github.sha }} | cut -c1-7)
          REPO=$(echo ghcr.io/${{ github.repository_owner }}/${{ inputs.app-name }} | tr '[:upper:]' '[:lower:]')
          echo "url=$REPO:$SHA" >> $GITHUB_OUTPUT
          echo "latest=$REPO:latest" >> $GITHUB_OUTPUT

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          push: true
          tags: |
            ${{ steps.image.outputs.url }}
            ${{ steps.image.outputs.latest }}
          build-args: ${{ inputs.build-args }}
          cache-from: type=registry,ref=${{ steps.image.outputs.latest }}
          cache-to: type=inline

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to CapRover
        uses: caprover/deploy-from-github@v1.1.2
        with:
          server: ${{ secrets.CAPROVER_SERVER }}
          app: ${{ secrets.CAPROVER_APP_NAME }}
          token: ${{ secrets.CAPROVER_APP_TOKEN }}
          image: ${{ needs.build.outputs.image-url }}
