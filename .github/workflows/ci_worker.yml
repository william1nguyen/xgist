name: Deploy Worker

on:
  push:
    branches: [master]
    paths:
      - ".github/workflows/ci_ai.yml"
      - ".github/workflows/_reusable-deploy.yml"
      - "apps/ai/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    uses: ./.github/workflows/_reusable-deploy.yml
    with:
      app-name: ai
      context: ./apps/ai
      dockerfile: ./apps/ai/Dockerfile
    secrets:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      CAPROVER_SERVER: ${{ secrets.CAPROVER_SERVER }}
      CAPROVER_APP_NAME: ${{ secrets.AI_APP_NAME }}
      CAPROVER_APP_TOKEN: ${{ secrets.AI_APP_TOKEN }}